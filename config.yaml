# Scout Phase 1 config.yaml
# 对应系统蓝图 v1.66 / v1.48 LLM 抽象层。时间字段存储永远 UTC；显示用 KST。

# ═══ LLM（预算 + 默认模型占位）═══
# v1.48 后真正的调用走 llm_providers（下面）；本节只保留全局预算控制。
llm:
  local_model: gemma4:e4b                # 兼容字段；新代码读 llm_providers.gemma_local.model
  cloud_model: claude-sonnet-4-6         # 兼容字段；未来 Sonnet 启用时配 llm_providers.claude_sonnet

  phase1_mode: gemma_only                # gemma_only / hybrid / cloud_only
  api_key_required: false                # Phase 1 不强制 API key

  # v1.66 USD 预算（稳态期准则；Phase 1 不生效但预写）
  daily_llm_cost_usd_running: 1          # v1.65 稳态日预算
  monthly_llm_cost_usd: 50               # 冷启动期月上限
  emergency_stop_single_call_usd: 10     # 单次调用硬熔断
  emergency_stop_daily_usd: 20           # 单日累计硬熔断

  # 原 doc KRW 字段（保留兼容）
  daily_cost_limit_krw: 4500
  monthly_cost_limit_krw: 60000

# ═══ LLM Providers（v1.48 抽象层）═══
# "能力需求绑定，不绑定模型" —— 每个 Agent 在 agents.* 下声明它用哪个 provider。
# 切换模型只改这里，不改代码。
# type 枚举：ollama / deepseek / anthropic / openai
# Phase A 只实装 ollama；其它 type 会抛 NotImplementedError。
llm_providers:
  gemma_local:
    type: ollama
    endpoint: http://localhost:11434
    model: gemma4:e4b
    max_tokens: 2048
    temperature: 0.1
    timeout: 30
    fallback: null                       # 本地模型无 fallback

  # 以下为 Phase B/C 占位 —— 配置已在但 type 实装缺席；改 agents.*.llm 指过来才会被装配
  # deepseek_v3:
  #   type: deepseek
  #   endpoint: https://api.deepseek.com
  #   model: deepseek-chat
  #   api_key_env: DEEPSEEK_API_KEY
  #   max_tokens: 4096
  #   temperature: 0.1
  #   timeout: 60
  #   fallback: gemma_local
  #
  # claude_sonnet:
  #   type: anthropic
  #   model: claude-sonnet-4-6
  #   api_key_env: ANTHROPIC_API_KEY
  #   max_tokens: 4096
  #   temperature: 0.1
  #   timeout: 60
  #   fallback: gemma_local

# ═══ Agents（v1.48 能力→provider 映射）═══
# 每个 Agent 声明用哪个 provider（key 指向 llm_providers.*）。
# 未列出的 Agent 走各自代码里写的默认（Phase A 只有 direction_judge / direction_backfill
# 真正读这里；其它 Agent 留给 Phase B 逐个迁移）。
agents:
  direction_judge:
    llm: gemma_local
  direction_backfill:
    llm: gemma_local

# ═══ 信源（Phase 1 5 个核心）═══
sources:
  D1:
    name: 国务院
    url: https://www.gov.cn/
    frequency_hours: 6
    credibility: 权威
  D4:
    name: Semantic Scholar
    api_url: https://api.semanticscholar.org/
    frequency_hours: 24
    credibility: 参考
  V1:
    name: 国家统计局
    frequency_hours: 24
    credibility: 权威
  V3:
    name: 韩国关税厅
    frequency_hours: 24
    credibility: 权威
  S4:
    name: AkShare
    frequency_hours: 12
    credibility: 权威

# ═══ 数据库 ═══
database:
  knowledge_db: data/knowledge.db
  queue_db: data/queue.db

# ═══ 并发 ═══
concurrency:
  max_workers: 4
  db_lock_timeout: 30                    # seconds
  transaction_isolation: IMMEDIATE       # IMMEDIATE / DEFERRED / EXCLUSIVE

# ═══ 错误处理 ═══
error_handling:
  max_retries: 3
  retry_backoff_base: 2                  # 指数退避：2^i 秒
  alert_webhook: null                    # 告警通道 URL，可选

# ═══ 时区 ═══
timezone: Asia/Seoul                      # 显示时区；存储永远 UTC

# ═══ 测试 ═══
testing:
  coverage_target: 60
  fixture_dir: tests/fixtures

# ═══ 运行模式 ═══
mode: cold_start                          # cold_start / running / diagnosis

# ═══ Push 全局策略（v1.61 勿扰时段）═══
# P0=critical(red) / P1=high(yellow) / P2=normal(blue) / P3=low(white) / P4=default
# 静默期内 always_push_levels 照推，其它级别攒到 digest_at 合并成一条 digest。
push:
  quiet_hours:
    enabled: true
    start: "00:00"                           # KST 本地时间 HH:MM
    end: "07:30"                             # 窗口半开 [start, end)
    timezone: KST                            # Phase 1 仅支持 KST
    always_push_levels: ["P0", "P1"]         # 静默期照推的级别
    digest_at: "07:30"                       # 静默期结束 → digest flush 时刻

# ═══ QQ 主动推送（v1.13 Phase 2A）═══
# 通过 QQ 开放平台 C2C API 把 push_outbox 里的消息推到指定用户。
# 所有 secrets 通过 .env 注入（见 .env.example）；明文不入 YAML/CI。
qq_push:
  enabled: true
  user_openid: ""                          # 从 env QQ_USER_OPENID 注入
  app_id: ""                               # 从 env QQ_BOT_APP_ID 注入
  client_secret: ""                        # 从 env QQ_BOT_SECRET 注入
  rate_limit_per_minute: 10                # 防刷屏：1 分钟最多 N 条
  max_content_length: 900                  # 单条 QQ 消息文本上限

# ══════════════════════ 投资原则（5 条结构化对象）══════════════════════

principles:
  - id: "P1"
    title: "异常可见性优先于执行速度"
    core: "知道出问题比解决问题更重要"
    application:
      - "买入前记录完整decision reasoning"
      - "每月回看持仓：假设是否仍成立"
      - "如果某假设不知道是否成立，先假定已改变"
      - "数据时效必须披露"
    warnings:
      - "持仓涨了但说不清为什么 = 危险信号"
      - "不记得何时做的判断 = 假设可能已失效"
    source: "Scout最高设计原则"

  - id: "P2"
    title: "结构>智能，纪律>灵活"
    core: "规则能做的不依赖LLM/直觉，稳定流程胜于聪明决定"
    application:
      - "买入前必做pre-mortem（3个失败场景）"
      - "持仓半年再平衡一次，不因短期波动调整"
      - "硬底线：动机失效/竞争格局变化/管理层换人 = 卖"
      - "3天涨>10%不买，让市场冷静"
    warnings:
      - "'这次不一样' = 纪律在被突破"
      - "'再等等看' = 纪律被情绪替代"
    source: "Scout两阶段决策+混合制架构"

  - id: "P3"
    title: "聚焦独特价值，拒绝广度"
    core: "在你真正懂的领域深耕，不为多元化而多元化"
    application:
      - "关注列表15个行业上限"
      - "每个行业建立深度理解（政策+动机+缺口+链条）"
      - "对不懂的领域say no（如DeFi/NFT/加密货币）"
      - "大师模块12视角 = 承认自己不是全知"
    warnings:
      - "'别人都买XX我也该买' = 广度陷阱"
      - "'趋势来了赶紧上' = 不懂也投"
    source: "Scout独特10%+深度不广度原则"

  - id: "P4"
    title: "工具+记忆互补，不替代判断"
    core: "数据不等于洞察，记忆不等于决策"
    application:
      - "看Scout推荐后问：Scout没看到什么"
      - "跨市场对比：Scout自动但你要再思考"
      - "Claude Desktop深度分析后，决策还是你做"
      - "盈亏归因：责任100%在你"
    warnings:
      - "'Scout说A级我就买' = 工具替代判断"
      - "'我直觉好不需要工具' = 工具被拒斥"
    source: "Scout责任边界+Scout+LLM协作架构"

  - id: "P5"
    title: "时间是朋友不是敌人"
    core: "3-5年持有期让你容错，短期噪音不重要"
    application:
      - "买入后3年内不看账户总市值"
      - "持仓分3-5次建仓，间隔至少1个月"
      - "市场恐慌时检查硬底线，不触发就持有"
      - "黑天鹅期考虑加仓而非恐慌卖"
    warnings:
      - "每天看账户 = 短期化陷阱"
      - "赶紧锁定利润 = 不相信时间"
    source: "3-5年持有定位+长期纪律系统"


